<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KMRQDHLKZE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KMRQDHLKZE');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>단어 퀴즈</title>
</head>
<body class="quiz-page">
  <nav class="app-nav index-nav" aria-label="네비게이션">
    <div class="nav-links">
      <button class="shift-btn" disabled>단어장</button>
      <button class="shift-btn" onclick="location.href='calendar.html'">캘린더</button>
      <button class="shift-btn" onclick="location.href='routine.html'">루틴</button>
    </div>
    <div class="nav-tools">
      <button id="studyTimerActionBtn" class="mobile-hide-on-phone" onclick="handleStudyTimerActionButtonClick()">순공 타이머 시작</button>
      <button id="studyTimerDisplay" class="timer-chip mobile-hide-on-phone" onclick="handleTimerDisplayClick()">순공 00:00:00</button>
      <button class="mobile-hide-on-phone" onclick="endStudySession()">공부 종료</button>
    </div>
  </nav>
  <div class="app-nav-subtools">
    <label class="theme-toggle" for="officeModeToggleInput">
      <input id="officeModeToggleInput" type="checkbox" onchange="toggleOfficeMode()" />
      <span class="theme-toggle-ui" aria-hidden="true"></span>
      <span class="theme-toggle-label">월루테마</span>
    </label>
  </div>

  <div class="container">
    <div class="top-bar">
      <span id="modeStatusLabel" class="mode-status-label" hidden>오답모드</span>
      <span class="progress">진행: <span id="progress">0 / 0</span></span>
      <span class="progress" id="accuracy">정답률: 0% (0/0)</span>
      <div class="quiz-direction-toggle" role="tablist" aria-label="퀴즈 모드">
        <button type="button" id="quizDirectionMeaningBtn" class="small-btn is-active" onclick="setQuizDirection('meaning')">뜻 맞추기</button>
        <button type="button" id="quizDirectionWordBtn" class="small-btn" onclick="setQuizDirection('word')">단어 맞추기</button>
      </div>
    </div>

    <div class="card">
      <div class="card-top-actions-right">
        <div class="top-menu-wrap">
          <button
            type="button"
            class="hamburger"
            id="topMenuButton"
            aria-label="메뉴 열기"
            aria-expanded="false"
            onclick="toggleTopMenu()"
          >
            <span></span>
          </button>
          <div id="topMenuDropdown" class="top-menu-dropdown" hidden>
            <div class="top-menu-group">
              <button type="button" class="top-menu-item top-menu-parent" data-submenu-target="view" aria-expanded="false" onclick="toggleTopSubmenu('view')">
                <span>목록보기</span>
                <span class="top-menu-arrow">&gt;</span>
              </button>
              <div id="topMenuSubmenuView" class="top-menu-submenu" hidden>
                <button type="button" class="top-menu-item top-menu-subitem" onclick="openCustomWordsModal()">전체단어목록</button>
                <button type="button" class="top-menu-item top-menu-subitem" onclick="openWordBookListModal()">기간단어목록</button>
                <button type="button" class="top-menu-item top-menu-subitem" onclick="closeTopMenu(); location.href='result.html'">오답노트</button>
              </div>
            </div>
            <button type="button" class="top-menu-item" onclick="openSaveWordBookModal()">저장하기</button>
            <button type="button" class="top-menu-item" onclick="openWordImportModal()">추가하기</button>
            <div class="top-menu-group">
              <button type="button" class="top-menu-item top-menu-parent danger" data-submenu-target="reset" aria-expanded="false" onclick="toggleTopSubmenu('reset')">
                <span>초기화하기</span>
                <span class="top-menu-arrow">&gt;</span>
              </button>
              <div id="topMenuSubmenuReset" class="top-menu-submenu" hidden>
                <button type="button" class="top-menu-item top-menu-subitem danger" onclick="resetCustomWords()">단어 전체 삭제하기</button>
                <button type="button" class="top-menu-item top-menu-subitem danger" onclick="closeTopMenu(); resetProgress()">퀴즈 진행상황 삭제하기</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <p id="hardModeWarning" class="hard-mode-warning" hidden>‼️☠️하드모드: 단어의 모든 뜻을 맞춰야 합니듀☠️‼️</p>
      <p id="quizSourceLabel" class="quiz-source-label">전체 단어</p>
      <h1 id="word">단어 마추기</h1>

      <input type="text" id="answer" placeholder="정답을 입력해주세듀" />
      <button id="checkAnswerBtn" onclick="checkAnswer()">확인</button>

      <p id="result"></p>
    </div>

    <div class="bottom-controls">
      <button onclick="setAllMode()">전체 모드</button>
      <button onclick="setWrongMode()">오답 모드</button>
      <button onclick="openWordBookShuffleModal()">기간선택</button>
      <button id="hardModeToggleBtn" type="button" onclick="toggleHardMode()" aria-pressed="false">하드모드☠️</button>
    </div>

  </div>

  <div id="wordImportModal" class="word-import-overlay" hidden>
    <div class="word-import-modal" role="dialog" aria-modal="true" aria-label="단어 추가">
      <button type="button" class="modal-close-btn" aria-label="닫기" onclick="closeWordImportModal()">×</button>
      <h2>단어 추가하기</h2>
      <p>형식: 영단어 한 줄, 뜻 한 줄 (반복). 뜻 여러 개는 쉼표로 구분.</p>
      <textarea
        id="wordImportTextarea"
        placeholder="accept&#10;받아들이다&#10;accident&#10;사고, 우연"
      ></textarea>
      <div class="word-import-actions">
        <button type="button" onclick="submitWordImport()">추가</button>
        <button type="button" class="small-btn" onclick="loadTestWordsFromRaw()">테스트용 단어</button>
      </div>
    </div>
  </div>

  <div id="customWordsModal" class="word-import-overlay" hidden>
    <div class="word-import-modal custom-words-modal" role="dialog" aria-modal="true" aria-label="단어 목록">
      <button type="button" class="modal-close-btn" aria-label="닫기" onclick="closeCustomWordsModal()">×</button>
      <h2 id="customWordsModalTitle">단어 목록</h2>
      <p id="customWordsSummary">0개</p>
      <div id="customWordsList" class="custom-words-list" aria-live="polite"></div>
      <div class="word-import-actions">
        <button type="button" onclick="copyCustomWordsList()">복사하기</button>
      </div>
    </div>
  </div>

  <div id="saveWordBookModal" class="word-import-overlay" hidden>
    <div class="word-import-modal" role="dialog" aria-modal="true" aria-label="단어장 저장">
      <button type="button" class="modal-close-btn" aria-label="닫기" onclick="closeSaveWordBookModal()">×</button>
      <h2>단어장 저장</h2>
      <p id="saveWordBookDateText">오늘 추가한 단어를 저장합니다.</p>
      <div class="save-wordbook-scope" role="radiogroup" aria-label="저장 범위 선택">
        <label class="save-wordbook-scope-option">
          <input type="radio" name="saveWordBookScope" value="today" checked />
          <span>오늘 추가한 단어만</span>
        </label>
        <label class="save-wordbook-scope-option">
          <input type="radio" name="saveWordBookScope" value="all" />
          <span>전체 단어</span>
        </label>
      </div>
      <input type="text" id="saveWordBookNameInput" placeholder="단어장 이름 입력" maxlength="40" />
      <div id="saveWordBookPreview" class="saved-wordbook-preview" aria-live="polite"></div>
      <div class="word-import-actions">
        <button type="button" onclick="submitSaveWordBook()">저장</button>
      </div>
    </div>
  </div>

  <div id="wordBookShuffleModal" class="word-import-overlay" hidden>
    <div class="word-import-modal" role="dialog" aria-modal="true" aria-label="단어장 불러오기">
      <button type="button" class="modal-close-btn" aria-label="닫기" onclick="closeWordBookShuffleModal()">×</button>
      <h2 id="wordBookModalTitle">단어장 불러오기</h2>
      <p id="wordBookModalDescription">저장된 단어장 중 선택한 기간에 해당하는 단어만 셔플합니다.</p>
      <div class="date-range-grid">
        <label>
          시작일
          <input type="date" id="wordBookShuffleStartDate" />
        </label>
        <label>
          종료일
          <input type="date" id="wordBookShuffleEndDate" />
        </label>
      </div>
      <div id="wordBookShufflePreview" class="saved-wordbook-preview" aria-live="polite"></div>
      <div class="word-import-actions">
        <button type="button" id="wordBookModalActionBtn" onclick="applyWordBookShuffle()">셔플 시작</button>
      </div>
    </div>
  </div>

  <script src="help-modal.js"></script>
  <script src="patch-notice.js"></script>
  <script src="todo-widget.js"></script>
  <script src="routine-now-banner.js"></script>
  <script src="script.js"></script>
</body>
</html>
